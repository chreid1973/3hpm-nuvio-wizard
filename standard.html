<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvio Stream Formatter Wizard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Nuvio Formatter Layout Wizard</h1>
            <p>Customize your baseline layout configurations easily</p>
        </header>

        <!-- Main Form Wrapper for app.js -->
        <div id="wizard" class="wizard-container">
            <!-- Dynamic elements load here via your app.js logic -->
        </div>

        <!-- Output Configuration Container -->
        <div id="output-section" class="output-container" style="display:none;">
            <h3>Your Configuration Payload</h3>
            <textarea id="config-output" readonly></textarea>
            <button id="copy-btn">Copy to Clipboard</button>
        </div>
    </div>

    <!-- Links right back to your intact root script -->
    <script src="app.js"></script>
</body>
</html>
